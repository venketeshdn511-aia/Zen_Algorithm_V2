global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'tradedeck-api'
    metrics_path: '/api/v1/observability/metrics' # Match your FastAPI metrics path
    static_configs:
      - targets: ['api:8000']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
